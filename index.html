<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Guess The Team</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>⚾ GUESS THE TEAM</h1>
    <h2>By Their Jersey Numbers</h2>
</header>


<section class="scoreboard">

    <div>
        <h3>TEAM</h3>
        <p id="teamName">???</p>
    </div>

    <div>
        <h3>SCORE</h3>
        <p id="score">0</p>
    </div>

    <div>
        <h3>PROGRESS</h3>
        <p id="progress">0 / 10</p>
    </div>

    <div>
        <h3>TIME</h3>
        <p id="timer">60</p>
    </div>

</section>



<main>

<div class="field">


    <div class="position cf">
        <span>CF</span>
        <div id="CF" class="card">?</div>
    </div>


    <div class="position lf">
        <span>LF</span>
        <div id="LF" class="card">?</div>
    </div>


    <div class="position rf">
        <span>RF</span>
        <div id="RF" class="card">?</div>
    </div>



    <div class="position ss">
        <span>SS</span>
        <div id="SS" class="card">?</div>
    </div>


    <div class="position second">
        <span>2B</span>
        <div id="2B" class="card">?</div>
    </div>


    <div class="position third">
        <span>3B</span>
        <div id="3B" class="card">?</div>
    </div>


    <div class="position first">
        <span>1B</span>
        <div id="1B" class="card">?</div>
    </div>



    <div class="position pitcher">
        <span>P</span>
        <div id="P" class="card">?</div>
    </div>



    <div class="position catcher">
        <span>C</span>
        <div id="C" class="card">?</div>
    </div>



    <div class="position dh">
        <span>DH</span>
        <div id="DH" class="card">?</div>
    </div>


</div>


<div class="controls">

    <input 
        id="guessInput"
        type="text"
        placeholder="Guess MLB team name"
    >


    <button id="guessBtn">
        GUESS
    </button>


    <button id="hintBtn">
        HINT
    </button>


    <button id="revealBtn">
        REVEAL
    </button>


    <button id="nextBtn">
        NEXT TEAM
    </button>

</div>



<h2 id="message"></h2>


<div id="answerBox">

</div>


</main>



<script src="teams.js"></script>
<script src="script.js"></script>


</body>

</html>
